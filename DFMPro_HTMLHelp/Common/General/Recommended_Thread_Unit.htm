<h1>Recommended Thread Unit "推奨ネジ単位"</h1>
<h4>ルール</h4>
<p>このルールは、組織内で一般的に使用されているねじ単位をチェックします。非標準のねじ単位が使用されている場合、このルールによってフラグが付けられます。</p>

<br>

<h4>説明</h4>
<p>設計エンジニアは、組織固有のねじ単位を使用すべきです。</p>

<br>

<h4>構成</h4>
<p>DFMProでは、組織内で一般的に使用されている許容ねじ単位をユーザーが構成できます。</p>

<br>
