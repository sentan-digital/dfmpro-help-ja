<h1>溶接アセンブリ チュートリアル</h1><br>
<p>溶接のワークフローは、<a href="../../Creo_Parametric/Tutorials/prismatic_milled_part.htm">プリズマティックミル加工部品</a>の場合と同じです。</p>
<p> </p>
<p>注記：</p><br>
<p>溶接の解析を実行する前に、製造プロセス（Manufacturing Process）オプションを <i>Welding</i> に設定してください。</p>
<p>製造プロセスオプションを Welding に設定した状態でアセンブリに対して DFMPro を実行すると、ルールファイルで選択された溶接ルールに基づき、アセンブリ全体に対する結果が算出されます。</p>
