<h1>Weld Leg for T- Joint "T接手の溶接脚長"</h1>
<h4>ルール</h4>
<p>すみ肉溶接のサイズは、十分な継手強度を確保し、過剰溶接および不足溶接による破損を防ぐために、適切である必要があります。</p>

<br>

<h4>説明</h4>
<p>すみ肉溶接の脚長は等しくする必要があります。脚長が等しい溶接は、作業時間の短縮、溶接材料の削減、入熱量の低減につながり、溶接継手の品質を向上させます。本ルールは、接合される板同士のなす角が90度であるT字継手を対象としています。</p>
