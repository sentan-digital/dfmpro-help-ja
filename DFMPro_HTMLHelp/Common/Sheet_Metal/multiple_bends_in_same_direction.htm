<h1>Multiple Bends in Same Direction "同一方向の複数曲げ"</h1>
<h4>ルール</h4>
<p>製造を容易にするため、同一平面上のすべての曲げは同じ方向に行われるべきです。</p>

<br>

<h4>説明</h4>
<p>板金部品において曲げ方向が異なる場合、異なる段取りが必要となります。その結果、作業者は複数回の位置変更を行う必要があり、全体のサイクルタイムが増加します。</p>

<br>

<h4>推奨事項</h4>
<p>製造を容易にするため、同一平面上のすべての曲げは同じ方向にすることを推奨します。</p>
