<h1>Maximum Bridge Height "最大ブリッジ深さ"</h1>
<h4>ルール</h4>
<p>最大ブリッジ高さは、ユーザーが指定した値以下である必要があります。</p>

<br>

<h4>説明</h4>
<p>ブリッジ高さは、加工中にシートメタルが変形または破断するのを防ぐため、適切な値である必要があります。</p>

<br>

<h4>推奨事項</h4>
<p>一般的なガイドラインとして、ブリッジ高さとシート厚さの比率は 4.0 以下であることが推奨されます。</p>

<br>
