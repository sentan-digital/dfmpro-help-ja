<h1>Flange Interference Check "フランジ干渉チェック"</h1>
<h4>ルール</h4>
<p>製造性を向上させるために、対象パーツ内でフランジが他の板金フィーチャーと干渉しないようにします。</p>

<br>

<h4>説明</h4>
<p>DFMPro は、フランジと、押し出し穴、ヘム、ダボ、ベースフランジ、ならびに各種フランジなどの他の板金フィーチャーとの間に発生する干渉を、対象パーツ内で識別します。視覚的にフランジ干渉を判断することが難しい複雑な板金パーツにおいて、特に有効です。</p>
