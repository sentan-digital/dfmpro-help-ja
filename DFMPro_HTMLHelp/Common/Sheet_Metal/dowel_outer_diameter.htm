<h1>Dowel Outer Diameter "ダウエル外径"</h1>
<h4>ルール</h4>
<p>ダウエルの外径は、ユーザーが指定した範囲の値内に収まっている必要があります。</p>

<br>

<h4>説明</h4>
<p>ダウエルの外径は、ユーザー指定の範囲値内にある必要があります。</p>

<br>

<h4>推奨事項</h4>
<p>一般的な指針として、ダウエルの外径は 3.0 mm より大きく、5.0 mm より小さいことが推奨されます。</p>
