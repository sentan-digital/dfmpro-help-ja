<h1>Tube End Mismatch "チューブ配管端部の不一致"</h1>
<h4>ルール</h4>
<p>このルールは、チューブ端部の不一致ケースをチェックします。</p>
<br>

<h4>説明</h4>
<p>チューブ端部は内径および外径が同一であり、かつ両方のチューブが軸方向に整列している必要があります。直径に不一致があると、不適切なチューブ接続につながります。</p>
<br>

<h4>推奨事項</h4>
<p>一般的な設計ガイドラインでは、チューブの内径および外径は同一であり、かつ軸方向に整列しているべきであると推奨されています。</p>
<br>

<h4>例</h4>
<div style="text-align:center;">
  <img alt="" border="0" src="../../assets/images/Common/image/Tube_End_Mismatch_1.png">
</div>
<div style="text-align:center;">
  <img alt="" border="0" src="../../assets/images/Common/image/Tube_End_Mismatch_2.png">
</div>
<br>

<p>ここで、</p>
<p>D1 および D2 = 外径</p>
<p>d1 および d2 = 内径</p>
